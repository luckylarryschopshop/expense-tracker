<!DOCTYPE html>
<html style="background:#0d1117;color:#e6edf3;font-family:sans-serif">
<head><title>Expense Tracker</title><style>body{padding:20px}form{margin-bottom:20px}input,select,button{padding:8px;margin:5px 0}table{width:100%;border-collapse:collapse}td,th{padding:8px;border:1px solid #2d3748}th{background:#1e293b}button{background:#f97316;color:white;border:none;cursor:pointer}button:hover{background:#ea580d}#bars{display:flex;gap:10px;margin:20px 0}#bars div{flex:1;background:#2d3748;border-radius:5px}#monthly{font-size:1.5em;font-weight:bold;text-align:center}</style></head>
<body><h1>Expense Tracker</h1>
<form id="form">
  <input type="number" id="amount" placeholder="Amount" required>
  <select id="category" required><option value="food">Food</option><option value="transport">Transport</option><option value="entertainment">Entertainment</option><option value="bills">Bills</option><option value="other">Other</option></select>
  <input type="text" id="description" placeholder="Description" required>
  <input type="date" id="date" required>
  <button type="submit">Add</button>
</form>
<div id="monthly"></div>
<div id="bars"></div>
<table id="table"><thead><tr><th>Date</th><th>Amount</th><th>Category</th><th>Description</th><th>Actions</th></tr></thead><tbody></tbody></table>
<div id="empty" style="display:none">No expenses found</div>
<div id="error" style="color:red;display:none"></div>
<script>
let data = [];
async function fetchExpenses() {
  try {
    const res = await fetch('/api/expense_tracker');
    data = await res.json();
    render();
  } catch (e) { document.getElementById('error').textContent = 'Failed to load expenses'; }
}
function render() {
  const table = document.querySelector('#table tbody');
  const monthly = document.getElementById('monthly');
  const bars = document.getElementById('bars');
  const empty = document.getElementById('empty');
  
  monthly.textContent = `Monthly Total: $${data.reduce((sum, e) => sum + e.amount, 0).toFixed(2)}`;
  bars.innerHTML = ['food','transport','entertainment','bills','other'].map(c => 
    `<div style="background:#f97316;width:${(data.filter(e => e.category === c).reduce((s,e) => s + e.amount, 0)/100)*100}%"></div>`).join('');
  
  table.innerHTML = data.map((e, i) => 
    `<tr><td>${e.date}</td><td>$${e.amount}</td><td>${e.category}</td><td>${e.description}</td>
     <td><button onclick="edit(${i})">Edit</button><button onclick="deleteExpense(${e.id})">Delete</button></td></tr>`).join('');
  
  empty.style.display = data.length ? 'none' : 'block';
}

document.getElementById('form').addEventListener('submit', async e => {
  e.preventDefault();
  const f = document.getElementById('form');
  const expense = { 
    amount: parseFloat(f.amount.value),
    category: f.category.value,
    description: f.description.value,
    date: f.date.value 
  };
  await fetch('/api/expense_tracker', { method:'POST', body:JSON.stringify(expense) });
  fetchExpenses();
});

async function deleteExpense(id) {
  await fetch(`/api/expense_tracker/${id}`, { method:'DELETE' });
  fetchExpenses();
}

function edit(i) {
  const e = data[i];
  document.getElementById('amount').value = e.amount;
  document.getElementById('category').value = e.category;
  document.getElementById('description').value = e.description;
  document.getElementById('date').value = e.date;
  document.querySelector('#form button').textContent = 'Update';
  document.querySelector('#form').onsubmit = async () => {
    await fetch(`/api/expense_tracker/${e.id}`, { method:'PUT', body:JSON.stringify({ ...e, amount:parseFloat(document.getElementById('amount').value) }) });
    fetchExpenses();
  };
}

fetchExpenses();
</script>
</body></html>
